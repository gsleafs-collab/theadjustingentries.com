<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Adjusting Entries</title>
  <meta name="description" content="Notes on accounting, tax, and the numbers behind the business." />
  <style>
    :root {
      --bg: #0d1320;
      --panel: #121a2b;
      --ink: #e9edf5;
      --muted: #9aa6bd;
      --gold: #c9a227;
      --line: #233049;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #16203a 0%, var(--bg) 60%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      width: 100%;
      max-width: 620px;
      text-align: center;
    }
    .eyebrow {
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 18px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 7vw, 56px);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 14px;
    }
    .rule {
      width: 64px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 22px;
      opacity: 0.8;
    }
    .tagline {
      font-size: clamp(16px, 2.6vw, 19px);
      color: var(--muted);
      max-width: 460px;
      margin: 0 auto 30px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 26px 24px;
    }
    .panel h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .panel p {
      font-size: 14px;
      color: var(--muted);
    }
    .badge {
      display: inline-block;
      margin-top: 18px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 14px;
    }
    footer {
      margin-top: 34px;
      font-size: 13px;
      color: var(--muted);
    }
    /*
      NEWSLETTER SIGNUP (activate later)
      When you are ready to collect subscribers, sign up with a provider
      such as Buttondown, Substack, or Mailchimp, then paste their embed
      form here in place of this comment.
    */
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Coming soon</div>
    <h1>The Adjusting Entries</h1>
    <div class="rule"></div>
    <p class="tagline">Notes on accounting, tax, and the numbers behind the business.</p>

    <section class="panel">
      <h2>A new newsletter is on the way</h2>
      <p>Clear, practical writing for owners, finance teams, and fellow professionals. Signups open shortly.</p>
      <span class="badge">Launching 2026</span>
    </section>

    <footer>&copy; 2026 The Adjusting Entries</footer>
  </main>
</body>
</html>
