<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Adjusting Entries</title>
  <meta name="description" content="Notes on accounting, tax, and the numbers behind the business." />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <style>
    :root {
      --bg: #0d1320;
      --panel: #121a2b;
      --ink: #e9edf5;
      --muted: #9aa6bd;
      --gold: #c9a227;
      --line: #233049;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #16203a 0%, var(--bg) 60%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      width: 100%;
      max-width: 620px;
      text-align: center;
    }
    .eyebrow {
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 18px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 7vw, 56px);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 14px;
    }
    .rule {
      width: 64px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 22px;
      opacity: 0.8;
    }
    .tagline {
      font-size: clamp(16px, 2.6vw, 19px);
      color: var(--muted);
      max-width: 460px;
      margin: 0 auto 30px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 26px 24px;
    }
    .panel h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .panel p {
      font-size: 14px;
      color: var(--muted);
    }
    .badge {
      display: inline-block;
      margin-top: 18px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 14px;
    }
    footer {
      margin-top: 34px;
      font-size: 13px;
      color: var(--muted);
    }
    /*
      NEWSLETTER SIGNUP (activate later)
      When you are ready to collect subscribers, sign up with a provider
      such as Buttondown, Substack, or Mailchimp, then paste their embed
      form here in place of this comment.
    */

    /* Tablets and large phones */
    @media (max-width: 600px) {
      body { padding: 32px 22px; }
      .panel { padding: 24px 20px; }
    }

    /* Phones */
    @media (max-width: 430px) {
      .eyebrow { font-size: 11px; letter-spacing: 0.22em; margin-bottom: 14px; }
      h1 { font-size: 33px; }
      .rule { margin-bottom: 18px; }
      .tagline { font-size: 16px; margin-bottom: 26px; }
      .panel { padding: 22px 18px; border-radius: 12px; }
      .panel p { font-size: 13.5px; }
      footer { margin-top: 28px; }
    }

    /* Small phones */
    @media (max-width: 360px) {
      body { padding: 28px 18px; }
      h1 { font-size: 29px; }
      .tagline { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Coming soon</div>
    <h1 id="ae-title" style="user-select:none">The Adjusting Entries</h1>
    <div class="rule"></div>
    <p class="tagline">Notes on accounting, tax, and the numbers behind the business.</p>

    <section class="panel">
      <h2>A new newsletter is on the way</h2>
      <p>Clear, practical writing for owners, finance teams, and fellow professionals. Signups open shortly.</p>
      <span class="badge">Launching 2026</span>
    </section>

    <footer>&copy; 2026 The Adjusting Entries</footer>
  </main>

  <script>
    /* Secret entrance: click the title 5 times to open the full site. */
    (function () {
      var t = document.getElementById('ae-title');
      if (!t) return;
      var clicks = 0, timer = null;
      t.addEventListener('click', function () {
        clicks++;
        clearTimeout(timer);
        timer = setTimeout(function () { clicks = 0; }, 1500);
        if (clicks >= 5) { clicks = 0; window.location.href = '/site/'; }
      });
    })();
  </script>
</body>
</html>
